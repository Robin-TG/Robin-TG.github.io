<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Sieve</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Green Sieve</h1>
            <button id="new-conversation" class="btn">New Conversation</button>
            <button id="conversations-btn" class="btn">Conversations</button>
        </header>

        <div class="main-content">
            <div class="chat-container">
                <div id="chat-history" class="chat-history"></div>
                <div class="input-area">
                    <div class="input-controls">
                        <button id="voice-input" class="btn btn-icon" title="Voice Input">
                            <span>🎤</span>
                        </button>
                        <input type="file" id="image-selector" accept="image/*" style="display: none;">
                        <button id="select-image" class="btn btn-icon" title="Select Image">
                            <span>🖼️</span>
                        </button>
                    </div>

                    <div id="conversations-sidebar" style="display:none; position:fixed; top:0; right:0; width:250px; height:100%; background:#fff; border-left:1px solid #ddd; overflow-y:auto; padding:10px; z-index:1000;">
                        <h3>Conversations</h3>
                        <ul id="conversations-list" style="list-style:none; padding:0;"></ul>
                        <div class="sidebar-actions">
                          <button id="delete-conv" class="btn">Delete Selected</button>
                          <button id="delete-all" class="btn">Delete All</button>
                        </div>
                    </div>

                    <div class="text-input-container">
                        <textarea id="user-input" placeholder="Type your message here..."></textarea>
                        <button id="send-button" class="btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <script src="app.js" defer></script>
</body>
</html>
